name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node:
          - "22"
          - "24"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Typecheck production
        run: npm run typecheck

      - name: Typecheck tests
        run: npm run typecheck:test

      - name: Run deterministic tests and packed-consumer checks
        run: npm test

      - name: Build package
        run: npm run build

      - name: Inspect publishable package
        run: npm pack --dry-run

      - name: Check pull-request diff
        if: github.event_name == 'pull_request'
        run: git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.sha }}"

      - name: Check pushed commit
        if: github.event_name != 'pull_request'
        run: git diff --check HEAD^..HEAD

      - name: Confirm source checkout is clean
        run: |
          status="$(git status --porcelain --untracked-files=all)"
          if [ -n "$status" ]; then
            printf '%s\n' "$status"
            exit 1
          fi
